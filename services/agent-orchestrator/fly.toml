app = "aegis-orchestrator"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHON_ENV = "production"
  PORT = "8001"

[[services]]
  internal_port = 8001
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8001"
  worker = "arq worker.WorkerSettings"
